<DOCTYPE html>
    <!-- Declara el tipo de documento. Indica al navegador que usará HTML5 -->
    <html lang="es">
    <!-- Elemento principal del documento HTML.
lang="es" indica que el contenido está en "español" -->

    <head> <!-- Sección de configuración del documento -->
        <meta charset="UTF-8">
        <!-- Define la combinación de caracteres.
    UTF-8 permite usar correctamente tildes, ñ, simbolos, etc-->
        <meta name="" viewport" content="width=device-width, initial-scale=1.8">
        <!-- Hace que el sitio sea responsive.
    Permite que el diseño se adapte correctamente a celulares y tablets-->
        <title>Practicando HTML - ing y video</title>
        <!--Título que aparece en el navegador -->
        <meta name="author" content="Iris C.V">
        <!--Indica quién creó el sitio web -->
        <link rel="stylesheet" href="static/css/style.css">
        <!--Conexión con hoja CSS de estilos -->
    </head>

    <body>
        <header> <!-- Encabezado del documento-->
            <h1> Sitio multimedia personal</h1>
        </header>
        <hr> <!-- Crea una línea de división-->
        <main><!-- Sección principal del documento-->
            <h2>Mis datos</h2>
            <p>Nombre: Iris Ccallomamani <!-- br es un salto de línea -->
                Curso: 3° C
            </p>
            <hr>
            <h2>Galería multimedia</h2>
            <p>Imagen de ejemplo</p>
            <ing src="static/images/beige flower.png" alt="Primera imagen" width="300">
            <ing src="static/images/beige flowers.png" alt="Primera imagen" width="300">
            <ing src="static/images/lugar de viaje.png" alt="Primera imagen" width="300"> 
            <hr>
                <h2>Videos</h2>
                <video width="600" controls>
                    <source src="static/videos/She Won't Go Away - Faye Webster (1080p, h264).mp4" type="video/mp4">
                </video>
                    <video width="600" controls>
                    <source src="static/videos/The World's Best Parkour and Freerunning - StuntsAmazing (1080p, h264).mp4" type="video/mp4">
                </video>
        </main>
        <footer>
            <p style="text-align:center"> Todos los derechos reservados
                -<a href="https://crearsalud.org/la-importancia-uno/"> Más información </a> <!-- etiqueta <a> para vinculos-->
            </p> 
        </footer>
    </body>
    </html>
